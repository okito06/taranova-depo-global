<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taranova Depo | Güvenli Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --corporate-blue: #2563EB; --light-bg: #F8FAFC; }
        body { background-color: var(--light-bg); font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; }
        .right-side { max-width: 450px; margin: 60px auto 30px auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px -10px rgba(37,99,235,0.1); }
        .brand { font-weight: 800; font-size: 2rem; letter-spacing: -1px; text-align: center; margin-bottom: 20px; }
        .btn-corporate { background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%); color: white; padding: 12px; border-radius: 12px; width: 100%; border: none; font-weight: 800; transition: 0.3s; }
        .btn-corporate:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4); color: white;}
    </style>
</head>
<body>
    <div class="container">
        <div class="right-side">
            <div class="text-center mb-4">
                <div class="brand">TARANOVA<span style="color: #2563EB;">DEPO</span></div>
                <h4 class="fw-bold" data-tr="Sisteme Giriş" data-en="Login to System">Sisteme Giriş</h4>
                <p class="text-muted small" data-tr="Yapay Zeka Destekli Depo Yönetimi" data-en="AI-Powered Warehouse Management">Yapay Zeka Destekli Depo Yönetimi</p>
            </div>
            
            <div id="loginErrorMessage" class="alert alert-danger d-none mb-3 small fw-bold"></div>
            <div id="loginSuccessMessage" class="alert alert-success d-none mb-3 small fw-bold"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold" data-tr="E-posta Adresi" data-en="Email Address">E-posta Adresi</label>
                    <input type="email" id="email" class="form-control form-control-lg" placeholder="ornek@sirket.com" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-bold" data-tr="Şifre" data-en="Password">Şifre</label>
                    <input type="password" id="password" class="form-control form-control-lg" placeholder="••••••" required>
                </div>
                
                <div class="text-end mb-4">
                    <a href="#" class="text-decoration-none small fw-bold text-muted" data-tr="Şifremi Unuttum" data-en="Forgot Password?">Şifremi Unuttum</a>
                </div>

                <button type="submit" id="loginBtn" class="btn-corporate btn-lg" data-tr="Giriş Yap" data-en="Login">Giriş Yap</button>
            </form>
            
            <p class="text-center mt-4 small text-muted">
                <span data-tr="Hesabınız yok mu?" data-en="Don't have an account?">Hesabınız yok mu?</span> 
                <a href="register.html" class="fw-bold text-decoration-none" style="color: #2563EB;" data-tr="Hemen Kayıt Ol" data-en="Sign Up Now">Hemen Kayıt Ol</a>
            </p>
        </div>
        
        <div class="text-center mt-4 mb-5" style="border-top: 1px solid #e2e8f0; padding-top: 20px;">
            <p class="text-muted small mb-1"><b>Taranova Bilişim ve Teknoloji A.Ş.</b></p>
            <p class="text-muted small mb-1"><i class="fa-solid fa-phone"></i> 0536 475 35 80</p>
            <p class="text-muted small mt-3" style="font-size: 10px;">PAYTR markası PayTR Ödeme ve Elektronik Para Kuruluşu A.Ş.’nin tescilli markasıdır.</p>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.keyCode == 'C'.charCodeAt(0)) return false; 
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        // Taranova Depo Global Şifreleri
        const firebaseConfig = {
            apiKey: "AIzaSyAce3zb1TSXfKhhTfcEF1H-B60rtRI0V98",
            authDomain: "taranova-depo-global.firebaseapp.com",
            projectId: "taranova-depo-global",
            storageBucket: "taranova-depo-global.firebasestorage.app",
            messagingSenderId: "860879768402",
            appId: "1:860879768402:web:08c84fe510c83a1b6d488b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Dil Ayarı (Otomatik)
        let currentLang = localStorage.getItem('taranova_lang') || 'tr';
        document.querySelectorAll('[data-tr]').forEach(el => el.innerHTML = el.getAttribute('data-' + currentLang));

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginErrorMessage');
            const successDiv = document.getElementById('loginSuccessMessage');

            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> İşlem Yapılıyor...';
            btn.disabled = true;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // E-posta Doğrulaması Kontrolü (Opsiyonel ama profesyonel)
                if (!user.emailVerified) {
                    errorDiv.innerText = currentLang === 'tr' ? "Lütfen önce E-posta adresinizi doğrulayın!" : "Please verify your email first!";
                    errorDiv.classList.remove('d-none');
                    btn.innerHTML = currentLang === 'tr' ? 'Giriş Yap' : 'Login';
                    btn.disabled = false;
                    return;
                }

                successDiv.innerText = currentLang === 'tr' ? "Giriş Başarılı! Uygulamaya yönlendiriliyorsunuz..." : "Login Successful! Redirecting...";
                successDiv.classList.remove('d-none');
                
                // ASIL SİHİR BURADA: GİRİŞ YAPAN ADAM APP SUNUCUSUNA (DASHBOARD) FIRLATILIR!
                setTimeout(() => { 
                    window.location.href = "https://app.taranovadepo.net"; 
                }, 1500);

            } catch (error) {
                btn.innerHTML = currentLang === 'tr' ? 'Giriş Yap' : 'Login';
                btn.disabled = false;
                errorDiv.innerText = currentLang === 'tr' ? "E-posta veya şifre hatalı!" : "Invalid email or password!";
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
