<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taranova Depo | Kayıt Ol</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 24px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px -10px rgba(37,99,235,0.1); }
        .brand { font-weight: 800; font-size: 2rem; letter-spacing: -1px; text-align: center; margin-bottom: 30px; }
        .form-control { padding: 12px 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #E2E8F0; }
        .btn-glow { background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%); color: white; font-weight: 800; padding: 12px; border-radius: 12px; width: 100%; border: none; transition: 0.3s; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4); }
        .alert { display: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand">TARANOVA<span style="color: #2563EB;">DEPO</span></div>
        <h4 class="fw-bold mb-4 text-center" data-tr="Hesap Oluştur" data-en="Create Account">Hesap Oluştur</h4>
        
        <div class="alert alert-danger" id="errorMsg"></div>
        <div class="alert alert-success" id="successMsg"></div>

        <form id="registerForm">
            <input type="text" id="fullName" class="form-control" placeholder="Ad Soyad / Full Name" required>
            <input type="email" id="email" class="form-control" placeholder="E-posta / Email" required>
            <input type="password" id="password" class="form-control" placeholder="Şifre / Password (Min 6 chars)" required>
            <button type="submit" class="btn-glow mt-2" data-tr="Kayıt Ol" data-en="Sign Up">Kayıt Ol</button>
        </form>
        
        <p class="text-center mt-4 text-muted">
            <span data-tr="Zaten hesabınız var mı?" data-en="Already have an account?">Zaten hesabınız var mı?</span> 
            <a href="login.html" class="fw-bold text-primary text-decoration-none" data-tr="Giriş Yap" data-en="Login">Giriş Yap</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAce3zb1TSXfKhhTfcEF1H-B60rtRI0V98",
            authDomain: "taranova-depo-global.firebaseapp.com",
            projectId: "taranova-depo-global",
            storageBucket: "taranova-depo-global.firebasestorage.app",
            messagingSenderId: "860879768402",
            appId: "1:860879768402:web:08c84fe510c83a1b6d488b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Dil Ayarı
        let currentLang = localStorage.getItem('taranova_lang') || 'tr';
        document.querySelectorAll('[data-tr]').forEach(el => el.innerHTML = el.getAttribute('data-' + currentLang));

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;
            const errBox = document.getElementById('errorMsg');
            const sucBox = document.getElementById('successMsg');
            
            errBox.style.display = 'none'; sucBox.style.display = 'none';

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Veritabanına kullanıcıyı Kontör = 0 ile kaydet
                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName,
                    email: email,
                    credits: 0,
                    createdAt: new Date().toISOString()
                });

                sucBox.innerText = currentLang === 'tr' ? "Kayıt Başarılı! Giriş sayfasına yönlendiriliyorsunuz..." : "Registration Successful! Redirecting to login...";
                sucBox.style.display = 'block';
                
                setTimeout(() => { window.location.href = "login.html"; }, 2000);
            } catch (error) {
                errBox.innerText = error.message;
                errBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
